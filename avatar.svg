<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E4585"/>
      <stop offset="100%" stop-color="#2B5CAB"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#EAF1FC" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#EAF1FC" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="100" fill="url(#glow)"/>

  <!-- Radar sweep rings (subtle) -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#EAF1FC" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#EAF1FC" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Crosshair ticks -->
  <g stroke="#EAF1FC" stroke-opacity="0.3" stroke-width="1.5">
    <line x1="100" y1="14" x2="100" y2="26"/>
    <line x1="100" y1="174" x2="100" y2="186"/>
    <line x1="14" y1="100" x2="26" y2="100"/>
    <line x1="174" y1="100" x2="186" y2="100"/>
  </g>

  <!-- Corner bracket frame, terminal/SOC style -->
  <g stroke="#EAF1FC" stroke-opacity="0.55" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M40 34 L34 34 L34 40"/>
    <path d="M160 34 L166 34 L166 40"/>
    <path d="M40 166 L34 166 L34 160"/>
    <path d="M160 166 L166 166 L166 160"/>
  </g>

  <!-- Status dot, echoes the site's "session active" dot -->
  <circle cx="146" cy="58" r="5" fill="#2F8A5B"/>
  <circle cx="146" cy="58" r="9" fill="none" stroke="#2F8A5B" stroke-opacity="0.35" stroke-width="2"/>

  <!-- Monogram -->
  <text x="100" y="122" font-family="'Space Grotesk', sans-serif" font-size="64" font-weight="700"
        fill="#FAFAF9" text-anchor="middle" letter-spacing="-1">SE</text>

  <!-- Mono underline accent -->
  <line x1="72" y1="136" x2="128" y2="136" stroke="#EAF1FC" stroke-opacity="0.5" stroke-width="2"/>
</svg>
